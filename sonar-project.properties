sonar.projectKey=andrescastiglia_rent
sonar.projectName=Real Estate Management System
sonar.projectVersion=1.1.0
sonar.organization=andrescastiglia-rent

# Monorepo: múltiples módulos
sonar.modules=backend,frontend,batch,mobile

# ─────────────────────────────────────────────────────────────
# BACKEND MODULE
# ─────────────────────────────────────────────────────────────
backend.sonar.projectName=Backend
backend.sonar.sources=src
backend.sonar.tests=src,test
backend.sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
backend.sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
backend.sonar.typescript.tsconfigPath=tsconfig.json
backend.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─────────────────────────────────────────────────────────────
# FRONTEND MODULE
# ─────────────────────────────────────────────────────────────
frontend.sonar.projectName=Frontend
frontend.sonar.sources=src
frontend.sonar.tests=src,e2e
frontend.sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx
frontend.sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/playwright-report/**,**/test-results/**
frontend.sonar.typescript.tsconfigPath=tsconfig.json
frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info
frontend.sonar.coverage.exclusions=src/app/**/layout.tsx,src/app/**/page.tsx,src/components/**,src/lib/api.ts,src/lib/frontend-metrics.ts,src/lib/toastBus.ts,src/lib/forceLogout.ts
frontend.sonar.cpd.exclusions=src/lib/api/ai.ts,src/types/**

# ─────────────────────────────────────────────────────────────
# BATCH MODULE
# ─────────────────────────────────────────────────────────────
batch.sonar.projectName=Batch
batch.sonar.sources=src
batch.sonar.tests=src
batch.sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
batch.sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
batch.sonar.typescript.tsconfigPath=tsconfig.json
batch.sonar.javascript.lcov.reportPaths=coverage/lcov.info
batch.sonar.coverage.exclusions=src/services/arca.service.ts,src/services/billing.service.ts,src/services/billing-job.service.ts,src/services/exchange-rate.service.ts,src/shared/database.ts

# ─────────────────────────────────────────────────────────────
# MOBILE MODULE
# ─────────────────────────────────────────────────────────────
mobile.sonar.projectName=Mobile
mobile.sonar.sources=app,src
mobile.sonar.tests=src
mobile.sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx
mobile.sonar.exclusions=**/node_modules/**,**/coverage/**,**/.expo/**,**/android/**,**/ios/**
mobile.sonar.coverage.exclusions=app/**,src/api/ai.ts,src/api/auth.ts,src/api/currencies.ts,src/api/dashboard.ts,src/api/interested.ts,src/api/leases.ts,src/api/owners.ts,src/api/payments.ts,src/api/pdf.ts,src/api/properties.ts,src/api/sales.ts,src/api/staff.ts,src/api/templates.ts,src/api/tenants.ts,src/api/uploads.ts,src/api/users.ts,src/api/whatsapp.ts,src/components/**,src/contexts/**,src/hooks/**,src/i18n/**,src/messages/**,src/providers/**,src/screens/**,src/theme/**,src/types/**
mobile.sonar.cpd.exclusions=src/api/ai.ts,src/types/**
mobile.sonar.typescript.tsconfigPath=tsconfig.json
mobile.sonar.javascript.lcov.reportPaths=coverage/lcov.info

