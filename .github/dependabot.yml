version: 2

updates:
  - package-ecosystem: npm
    directory: /backend
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/Buenos_Aires
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps-backend)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: typeorm
        update-types:
          - version-update:semver-major
      - dependency-name: node-html-parser
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /frontend
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: America/Buenos_Aires
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps-frontend)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: marked
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /mobile
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: America/Buenos_Aires
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - mobile
    commit-message:
      prefix: "chore(deps-mobile)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: react
        update-types:
          - version-update:semver-major
      - dependency-name: react-dom
        update-types:
          - version-update:semver-major
      - dependency-name: react-native
        update-types:
          - version-update:semver-major
      - dependency-name: expo
        update-types:
          - version-update:semver-major
      - dependency-name: expo-constants
        update-types:
          - version-update:semver-major
      - dependency-name: expo-file-system
        update-types:
          - version-update:semver-major
      - dependency-name: expo-font
        update-types:
          - version-update:semver-major
      - dependency-name: expo-image-picker
        update-types:
          - version-update:semver-major
      - dependency-name: expo-linking
        update-types:
          - version-update:semver-major
      - dependency-name: expo-localization
        update-types:
          - version-update:semver-major
      - dependency-name: expo-router
        update-types:
          - version-update:semver-major
      - dependency-name: expo-secure-store
        update-types:
          - version-update:semver-major
      - dependency-name: expo-sharing
        update-types:
          - version-update:semver-major
      - dependency-name: expo-status-bar
        update-types:
          - version-update:semver-major
      - dependency-name: react-native-gesture-handler
        update-types:
          - version-update:semver-major
      - dependency-name: react-native-webview
        update-types:
          - version-update:semver-major
      - dependency-name: detox
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /batch
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "05:45"
      timezone: America/Buenos_Aires
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - batch
    commit-message:
      prefix: "chore(deps-batch)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: typeorm
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Buenos_Aires
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps-actions)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: America/Buenos_Aires
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - infra
    commit-message:
      prefix: "chore(deps-docker)"
    groups:
      docker-images:
        patterns:
          - "*"
